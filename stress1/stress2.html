<!DOCTYPE html>
<html>

<head>
    <title>Stress Features</title>
    <link rel="stylesheet" href="stress.css">
    <script src="stress.js"></script>
</head>

<body>

    <div class="container">

        <div class="nav-links">
            <h2 style="font-size: 32px; margin-bottom: 25px;">Enter Details</h2>
            <div style="display: flex; gap: 10px; flex-shrink: 0; align-items: baseline;">
                <a href="chat.html" class="nav-a" style="color: #8b5cf6; font-weight: bold; text-decoration: none;">💬
                    Ask AI Assistant</a>
            </div>
        </div>
        <h2>Your Daily Habits</h2>

        <form onsubmit="detectStress(); return false;">

            <!-- Demographic -->
            <label>Age</label>
            <input type="number" id="age" required>

            <label>Weight (kg)</label>
            <input type="number" id="weight" required>

            <!-- Daily Routine -->
            <label>Sleep Hours</label>
            <input type="number" step="0.5" id="sleep" max="12" required>

            <label>Sleep Timing (Early, Normal, Late)</label>
            <select id="sleep_timing">
                <option value="Early">Early (Before 10 PM)</option>
                <option value="Normal">Normal (10 PM - 12 AM)</option>
                <option value="Late">Late (After 12 AM)</option>
            </select><br><br>

            <label>Location Type (Environment)</label>
            <select id="location_type">
                <option value="Urban">Urban (City living)</option>
                <option value="Rural">Rural (Town/Countryside)</option>
            </select><br><br>

            <label>Work Hours</label>
            <input type="number" step="0.5" id="work" max="15" required>

            <label>Study Hours</label>
            <input type="number" step="0.5" id="study" max="10" required>

            <label>Exercise (hours/day)</label>
            <input type="number" step="0.5" id="exercise" max="4" required>

            <label>Water Intake (glasses)</label>
            <input type="number" id="water" max="10" required>

            <!-- Diet & Health -->
            <label>Diet Quality (1-10, 10 is very healthy)</label>
            <input type="number" id="healthy_diet" min="1" max="10" required>

            <label>Fast Food per week</label>
            <input type="number" id="fast_food" min="0" required>

            <label>Current Health Issues?</label>
            <select id="health_issues">
                <option value="0">No</option>
                <option value="1">Yes</option>
            </select><br><br>

            <!-- Stress Factors -->
            <label>Exam Preparation?</label>
            <select id="exam_prep">
                <option value="0">No</option>
                <option value="1">Yes</option>
            </select><br><br>

            <label>Family/Relationship Issues?</label>
            <select id="family_issues">
                <option value="0">No</option>
                <option value="1">Yes</option>
            </select><br><br>

            <!-- Social Media -->
            <label>Do you use Social Media?</label>
            <select id="social_media">
                <option value="0">No</option>
                <option value="1" selected>Yes</option>
            </select><br><br>

            <label>Instagram Hours (if yes)</label>
            <input type="number" step="0.5" id="instagram" value="0">

            <label>Facebook Hours (if yes)</label>
            <input type="number" step="0.5" id="facebook" value="0">

            <button type="submit">Check Stress Level</button>

        </form>

        <p id="result"></p>

        <div id="suggestion"></div>

        <div class="action-buttons" id="actionButtons" style="display: none;">
            <button id="downloadBtn" onclick="downloadReport()">Download Report</button>
        </div>

        <button class="logout-btn" onclick="logoutUser()">Logout</button>

    </div>

    <div class="watermark">Created by VISHAL GHASOLIYA</div>

    <!-- jsPDF Library for generating PDF Reports directly in the browser -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="stress.js"></script>
</body>

</html>
