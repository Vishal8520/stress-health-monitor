<!DOCTYPE html>
<html>

<head>
    <title>Login - Stress Health Monitor</title>
    <link rel="stylesheet" href="stress.css">
</head>

<body>

    <div class="container">

        <h1>🌿 Stress Health Monitor</h1>

        <h2>Login</h2>

        <form id="loginForm">

            <label>Email</label>
            <input type="email" id="loginEmail" required>

            <label>Password</label>
            <input type="password" id="loginPassword" required>

            <button type="submit">Login</button>

        </form>

        <p style="text-align: center; margin-top: 20px;">
            <a href="stress.html" style="color: #27ae60; text-decoration: none; font-weight: 600;">Need an account?
                Register here</a>
        </p>

    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const data = {
                email: document.getElementById('loginEmail').value,
                password: document.getElementById('loginPassword').value
            };

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'ngrok-skip-browser-warning': '69420'
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                if (result.success) {
                    // Save email to link to future reports
                    localStorage.setItem('userEmail', data.email);
                    window.location.href = 'stress2.html';
                } else {
                    alert('Login Failed: ' + result.error);
                }
            } catch (error) {
                alert('Error connecting to backend.');
            }
        });
    </script>

    <div class="watermark">Created by VISHAL GHASOLIYA</div>

</body>

</html>
